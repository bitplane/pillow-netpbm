name: Unit tests

on: [push]

jobs:
  build:

    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Install netpbm
        run: sudo apt-get update && sudo apt-get install -y netpbm
      - name: netpbm info
        run: |
          dpkg -l netpbm
          fiascotopnm --version 2>&1 || true
          timeout 5 fiascotopnm tests/data/fiasco/abydos.fco > /tmp/fiasco-test.ppm 2>&1 || echo "exit: $?"
          ls -la /tmp/fiasco-test.ppm 2>/dev/null || echo "no output"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build dev environment
        run: make dev
      - name: Unit tests
        run: make test
